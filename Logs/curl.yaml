apiVersion: v1
kind: Pod
metadata:
  labels:
    run: curl
  name: curl
spec:
  serviceAccountName: logs
  automountServiceAccountToken: false
  containers:
    - image: curlimages/curl:latest
      name: curl
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
            curl -v http://nginx-deploy.default.svc.cluster.local;
            sleep 1;
          done
      resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
